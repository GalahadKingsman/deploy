# Production stack: Postgres + Redis + MinIO + API + bot (polling).
# Webapp: собери статику (pnpm --filter @tracked/webapp build) и отдавай через nginx.
#
# Запуск из корня репозитория:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Подставь домены/секреты в .env; для BOT_API_BASE_URL внутри сети compose:
#   BOT_API_BASE_URL=http://api:3001

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracked_lms}
      POSTGRES_USER: ${POSTGRES_USER:-tracked}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracked_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tracked} -d ${POSTGRES_DB:-tracked_lms}']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data
    ports:
      - '${MINIO_PORT:-9000}:9000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-tracked-prod}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb -p local/$$MINIO_BUCKET || true &&
        mc anonymous set download local/$$MINIO_BUCKET || true &&
        printf '%s\n' '{"CORSRules":[{"AllowedOrigins":["*"],"AllowedMethods":["GET","PUT","POST","DELETE","HEAD"],"AllowedHeaders":["*"],"ExposeHeaders":["ETag","x-amz-request-id"],"MaxAgeSeconds":3600}]}' > /tmp/cors.json &&
        mc cors set-json local/$$MINIO_BUCKET /tmp/cors.json || true
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracked}:${POSTGRES_PASSWORD:-tracked_password}@postgres:5432/${POSTGRES_DB:-tracked_lms}
      REDIS_URL: redis://redis:6379
      MIGRATIONS_DIR: /app/infra/migrations
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Сброс пароля по почте (из .env в контейнер)
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      PASSWORD_RESET_MAX_PER_EMAIL: ${PASSWORD_RESET_MAX_PER_EMAIL:-5}
      PASSWORD_RESET_WINDOW_MS: ${PASSWORD_RESET_WINDOW_MS:-3600000}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-0}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_password}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${MINIO_BUCKET:-tracked-prod}
      S3_FORCE_PATH_STYLE: 'true'
    ports:
      - '${API_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    environment:
      NODE_ENV: production
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_API_BASE_URL: ${BOT_API_BASE_URL:-http://api:3001}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-https://app.edify.su}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_data: