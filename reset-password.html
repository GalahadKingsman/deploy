<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- Optional: set by server (same as edify-site) -->
    <meta name="edify-api-base" content="" />
    <title>Сброс пароля</title>
    <style>
      :root{--bg:#0b1220;--card:#0f1a2e;--t1:#e8eefc;--t2:rgba(232,238,252,.7);--line:rgba(232,238,252,.12);--a:#0aa8c8;--err:#ef4444}
      *{box-sizing:border-box}
      body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:radial-gradient(1200px 500px at 20% 0%,rgba(10,168,200,.25),transparent),var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
      .card{width:100%;max-width:460px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,.35);padding:18px}
      h1{font-size:18px;margin:0 0 6px}
      p{margin:0 0 14px;color:var(--t2);font-size:13px;line-height:1.5}
      label{display:block;font-size:12px;color:var(--t2);margin:10px 0 6px}
      input{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(10,15,25,.45);color:var(--t1);outline:none}
      input:focus{border-color:rgba(10,168,200,.5);box-shadow:0 0 0 4px rgba(10,168,200,.12)}
      button{margin-top:14px;width:100%;padding:11px 14px;border-radius:12px;border:none;background:linear-gradient(180deg,rgba(10,168,200,.95),rgba(22,119,206,.95));color:#fff;font-weight:700;cursor:pointer}
      button:hover{filter:brightness(1.02)}
      .msg{margin-top:12px;font-size:13px}
      .msg.err{color:var(--err)}
      .msg.ok{color:#22c55e}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Сброс пароля</h1>
      <p>Введите новый пароль. Ссылка одноразовая и действует ограниченное время.</p>
      <form id="f">
        <label>Новый пароль</label>
        <input id="p1" type="password" minlength="8" maxlength="200" autocomplete="new-password" required />
        <label>Повторите пароль</label>
        <input id="p2" type="password" minlength="8" maxlength="200" autocomplete="new-password" required />
        <button type="submit">Сохранить пароль</button>
      </form>
      <div id="msg" class="msg"></div>
    </div>
    <script>
      const qs = new URLSearchParams(location.search);
      const token = (qs.get('token') || '').trim();
      const apiMeta = document.querySelector('meta[name="edify-api-base"]')?.getAttribute('content') || '';
      const apiBase = apiMeta.trim() ? apiMeta.trim().replace(/\/$/, '') : '';
      const api = apiBase || (location.origin.includes('localhost') ? 'http://localhost:3001' : location.origin);

      const $ = (id) => document.getElementById(id);
      const msg = $('msg');

      if (!token) {
        msg.textContent = 'Отсутствует токен сброса (token).';
        msg.className = 'msg err';
      }

      $('f').addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = '';
        msg.className = 'msg';
        if (!token) return;
        const p1 = $('p1').value;
        const p2 = $('p2').value;
        if (p1 !== p2) {
          msg.textContent = 'Пароли не совпадают.';
          msg.className = 'msg err';
          return;
        }
        try {
          const res = await fetch(api + '/auth/password/reset/confirm', {
            method: 'POST',
            headers: { 'content-type': 'application/json', accept: 'application/json' },
            body: JSON.stringify({ token, newPassword: p1 }),
          });
          if (!res.ok) {
            msg.textContent = 'Не удалось сбросить пароль. Ссылка могла истечь или быть использована.';
            msg.className = 'msg err';
            return;
          }
          msg.textContent = 'Пароль обновлён. Теперь можно войти с новым паролем.';
          msg.className = 'msg ok';
          $('p1').value = '';
          $('p2').value = '';
        } catch {
          msg.textContent = 'Ошибка сети. Попробуйте позже.';
          msg.className = 'msg err';
        }
      });
    </script>
  </body>
</html>
